<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#1f2937" rx="64"/>
  <g transform="translate(128, 128)">
    <!-- 华容道棋盘 -->
    <rect x="0" y="0" width="256" height="320" fill="#374151" rx="8"/>

    <!-- 曹操 (红色 2x2) -->
    <rect x="64" y="16" width="128" height="128" fill="#ef4444" rx="8"/>
    <text x="128" y="90" font-size="36" fill="white" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">曹操</text>

    <!-- 关羽 (绿色 2x1) -->
    <rect x="64" y="160" width="128" height="64" fill="#22c55e" rx="8"/>
    <text x="128" y="200" font-size="24" fill="white" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">关羽</text>

    <!-- 小兵 (黄色 1x1) -->
    <rect x="16" y="240" width="64" height="64" fill="#eab308" rx="8"/>
    <text x="48" y="280" font-size="24" fill="white" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">卒</text>

    <rect x="96" y="240" width="64" height="64" fill="#eab308" rx="8"/>
    <text x="128" y="280" font-size="24" fill="white" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">卒</text>

    <rect x="176" y="240" width="64" height="64" fill="#eab308" rx="8"/>
    <text x="208" y="280" font-size="24" fill="white" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">卒</text>
  </g>
</svg>
